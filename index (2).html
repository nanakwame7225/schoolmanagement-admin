<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SchoolManagement GH — Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0a0e1a; --surface:#111827; --surface2:#1a2235; --border:#2a3a52;
  --accent:#00d4ff; --green:#10b981; --red:#ef4444; --gold:#f59e0b; --purple:#7c3aed;
  --text:#e2e8f0; --text2:#94a3b8; --text3:#64748b;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Sora',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#0a0e1a,#0f172a);}
.login-box{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:40px;width:380px;}
.login-box h1{font-size:22px;font-weight:800;margin-bottom:4px;}
.login-box p{color:var(--text3);font-size:13px;margin-bottom:28px;}
.field{margin-bottom:16px;}
.field label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.8px;}
.field input{width:100%;padding:12px 16px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Sora',sans-serif;font-size:13px;outline:none;}
.field input:focus{border-color:var(--accent);}
.btn{padding:12px 20px;border:none;border-radius:8px;font-family:'Sora',sans-serif;font-size:13px;font-weight:700;cursor:pointer;}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--purple));color:#000;width:100%;}
.btn-secondary{background:var(--surface2);color:var(--text2);border:1px solid var(--border);}
.btn-danger{background:rgba(239,68,68,0.15);color:var(--red);border:1px solid rgba(239,68,68,0.3);}
.btn-success{background:rgba(16,185,129,0.15);color:var(--green);border:1px solid rgba(16,185,129,0.3);}
.btn-sm{padding:6px 12px;font-size:11px;}
.error{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);border-radius:8px;padding:10px 14px;font-size:12px;color:var(--red);margin-top:12px;display:none;}

/* App */
#app{display:none;flex-direction:column;min-height:100vh;}
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;height:60px;display:flex;align-items:center;gap:16px;}
.header h1{font-size:16px;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.header-badge{padding:4px 12px;background:rgba(0,212,255,0.1);border:1px solid rgba(0,212,255,0.2);border-radius:20px;font-size:11px;font-weight:600;color:var(--accent);}
.header-spacer{flex:1;}
.logout-btn{background:transparent;border:1px solid var(--border);color:var(--text2);padding:6px 14px;border-radius:8px;cursor:pointer;font-family:'Sora',sans-serif;font-size:12px;}
.main{padding:24px;max-width:1200px;margin:0 auto;width:100%;}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:28px;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;}
.stat-label{font-size:12px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:0.6px;margin-bottom:8px;}
.stat-value{font-size:28px;font-weight:800;font-family:'JetBrains Mono',monospace;}
.stat-value.cyan{color:var(--accent);}
.stat-value.green{color:var(--green);}
.stat-value.red{color:var(--red);}
.stat-value.gold{color:var(--gold);}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:20px;}
.card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
.card-title{font-size:15px;font-weight:700;}
table{width:100%;border-collapse:collapse;font-size:13px;}
th{padding:10px 14px;text-align:left;font-size:11px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:0.6px;border-bottom:1px solid var(--border);}
td{padding:10px 14px;border-bottom:1px solid var(--border);}
.badge{padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700;}
.badge-active{background:rgba(16,185,129,0.15);color:var(--green);}
.badge-inactive{background:rgba(239,68,68,0.15);color:var(--red);}
.badge-expired{background:rgba(245,158,11,0.15);color:var(--gold);}
.badge-trial{background:rgba(0,212,255,0.15);color:var(--accent);}
.badge-premium{background:rgba(124,58,237,0.15);color:#a78bfa;}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:100;display:none;align-items:center;justify-content:center;}
.modal-overlay.show{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:24px;width:480px;max-width:96vw;}
.modal h3{font-size:16px;font-weight:700;margin-bottom:20px;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.form-field{margin-bottom:12px;}
.form-field label{display:block;font-size:11px;font-weight:600;color:var(--text3);margin-bottom:4px;text-transform:uppercase;}
.form-field input,.form-field select{width:100%;padding:9px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Sora',sans-serif;font-size:13px;outline:none;}
.modal-footer{display:flex;gap:10px;justify-content:flex-end;margin-top:20px;}
.toast-container{position:fixed;top:20px;right:20px;z-index:999;display:flex;flex-direction:column;gap:8px;}
.toast{padding:10px 16px;border-radius:8px;font-size:13px;font-weight:600;border:1px solid;animation:slideIn 0.3s ease;}
@keyframes slideIn{from{transform:translateX(100%);opacity:0;}to{transform:translateX(0);opacity:1;}}
.toast.success{background:rgba(16,185,129,0.95);border-color:var(--green);color:#fff;}
.toast.error{background:rgba(239,68,68,0.95);border-color:var(--red);color:#fff;}
.toast.info{background:rgba(17,24,39,0.97);border-color:var(--border);color:var(--text);}
.mono{font-family:'JetBrains Mono',monospace;}
</style>
</head>
<body>

<div class="toast-container" id="toastContainer"></div>

<!-- Login -->
<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <h1>🏫 SchoolManagement GH</h1>
    <p>Super Admin — Platform Management</p>
    <div class="field">
      <label>Username</label>
      <input type="text" id="saUser" value="SUPERADMIN" autocomplete="off">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="saPass" onkeydown="if(event.key==='Enter')doSALogin()">
    </div>
    <button class="btn btn-primary" onclick="doSALogin()" id="loginBtn">▶ Login</button>
    <div class="error" id="loginError"></div>
  </div>
</div>

<!-- App -->
<div id="app" style="display:none;flex-direction:column;">
  <div class="header">
    <h1>🏫 SchoolManagement GH</h1>
    <span class="header-badge">Super Admin</span>
    <div class="header-spacer"></div>
    <button class="logout-btn" onclick="doLogout()">Logout</button>
  </div>
  <div class="main">
    <div class="stats-grid" id="statsGrid"></div>
    <div class="card">
      <div class="card-header">
        <div class="card-title">🏫 All Schools</div>
        <button class="btn btn-primary btn-sm" onclick="openAddSchool()">+ Add School</button>
      </div>
      <div style="overflow-x:auto;">
        <table>
          <thead>
            <tr>
              <th>School</th><th>Slug</th><th>Plan</th><th>Expiry</th><th>Status</th><th>Actions</th>
            </tr>
          </thead>
          <tbody id="schoolsTable"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- Add School Modal -->
<div class="modal-overlay" id="addSchoolModal">
  <div class="modal">
    <h3>➕ Add New School</h3>
    <div class="form-grid">
      <div class="form-field" style="grid-column:1/-1;">
        <label>School Name *</label>
        <input type="text" id="sName" placeholder="NOVELTY MONTESSORI SCHOOL">
      </div>
      <div class="form-field">
        <label>Slug (URL identifier) *</label>
        <input type="text" id="sSlug" placeholder="novelty" oninput="this.value=this.value.toLowerCase().replace(/[^a-z0-9-]/g,'')">
      </div>
      <div class="form-field">
        <label>Admin Password *</label>
        <input type="text" id="sPassword" placeholder="SCHOOL2025">
      </div>
      <div class="form-field">
        <label>Phone</label>
        <input type="text" id="sPhone" placeholder="0244 000 000">
      </div>
      <div class="form-field">
        <label>Email</label>
        <input type="text" id="sEmail" placeholder="info@school.edu.gh">
      </div>
      <div class="form-field">
        <label>Plan</label>
        <select id="sPlan">
          <option value="trial">Trial (30 days free)</option>
          <option value="starter">Starter</option>
          <option value="growth">Growth</option>
          <option value="premium">Premium</option>
        </select>
      </div>
      <div class="form-field">
        <label>Access Days</label>
        <input type="number" id="sDays" value="30" min="1">
      </div>
    </div>
    <div id="addSchoolError" class="error"></div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('addSchoolModal')">Cancel</button>
      <button class="btn btn-primary" onclick="addSchool()">Create School</button>
    </div>
  </div>
</div>

<!-- Extend Subscription Modal -->
<div class="modal-overlay" id="extendModal">
  <div class="modal">
    <h3>📅 Extend Subscription</h3>
    <input type="hidden" id="extendSlug">
    <div class="form-grid">
      <div class="form-field">
        <label>Months to Add</label>
        <input type="number" id="extendMonths" value="1" min="1">
      </div>
      <div class="form-field">
        <label>Plan</label>
        <select id="extendPlan">
          <option value="trial">Trial</option>
          <option value="starter">Starter</option>
          <option value="growth">Growth</option>
          <option value="premium">Premium</option>
        </select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('extendModal')">Cancel</button>
      <button class="btn btn-primary" onclick="extendSubscription()">Extend</button>
    </div>
  </div>
</div>

<script>
const API_BASE = 'https://schoolmanagement-gh-production.up.railway.app/api';
let SA_TOKEN = localStorage.getItem('sa_token') || '';

async function saApi(method, path, body) {
  const res = await fetch(API_BASE + path, {
    method,
    headers: { 'Content-Type': 'application/json', ...(SA_TOKEN ? { Authorization: 'Bearer ' + SA_TOKEN } : {}) },
    ...(body ? { body: JSON.stringify(body) } : {})
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || 'API error');
  return data;
}

function toast(msg, type='info') {
  const el = document.createElement('div');
  el.className = 'toast ' + type;
  el.textContent = msg;
  document.getElementById('toastContainer').appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

async function doSALogin() {
  const u = document.getElementById('saUser').value.trim();
  const p = document.getElementById('saPass').value;
  const btn = document.getElementById('loginBtn');
  const err = document.getElementById('loginError');
  btn.textContent = 'Logging in...'; btn.disabled = true;
  try {
    const data = await saApi('POST', '/super/login', { username: u, password: p });
    SA_TOKEN = data.token;
    localStorage.setItem('sa_token', SA_TOKEN);
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    loadDashboard();
  } catch(e) {
    err.textContent = e.message; err.style.display = 'block';
    setTimeout(() => err.style.display = 'none', 3000);
  } finally { btn.textContent = '▶ Login'; btn.disabled = false; }
}

function doLogout() {
  SA_TOKEN = ''; localStorage.removeItem('sa_token');
  document.getElementById('app').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
}

async function loadDashboard() {
  try {
    const [stats, schools] = await Promise.all([saApi('GET', '/super/stats'), saApi('GET', '/super/schools')]);
    renderStats(stats);
    renderSchools(schools);
  } catch(e) { toast('Failed to load: ' + e.message, 'error'); }
}

function renderStats(s) {
  document.getElementById('statsGrid').innerHTML = `
    <div class="stat-card"><div class="stat-label">Total Schools</div><div class="stat-value cyan">${s.totalSchools}</div></div>
    <div class="stat-card"><div class="stat-label">Active Schools</div><div class="stat-value green">${s.activeSchools}</div></div>
    <div class="stat-card"><div class="stat-label">Expired</div><div class="stat-value red">${s.expiredSchools}</div></div>
    <div class="stat-card"><div class="stat-label">Total Revenue</div><div class="stat-value gold">GHS ${(s.totalRevenue||0).toFixed(2)}</div></div>
  `;
}

function renderSchools(schools) {
  const tbody = document.getElementById('schoolsTable');
  if (!schools.length) { tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:var(--text3);padding:30px;">No schools yet. Add your first school.</td></tr>'; return; }
  tbody.innerHTML = schools.map(s => {
    const expiry = new Date(s.planExpiry);
    const expired = expiry < new Date();
    const daysLeft = Math.ceil((expiry - new Date()) / (1000*60*60*24));
    const statusBadge = !s.active ? '<span class="badge badge-inactive">Inactive</span>' : expired ? '<span class="badge badge-expired">Expired</span>' : '<span class="badge badge-active">Active</span>';
    const planBadge = s.plan === 'premium' ? '<span class="badge badge-premium">Premium</span>' : s.plan === 'trial' ? '<span class="badge badge-trial">Trial</span>' : '<span class="badge badge-active">'+s.plan+'</span>';
    return `<tr>
      <td><strong>${s.name}</strong><div style="font-size:11px;color:var(--text3);">${s.email||''}</div></td>
      <td class="mono" style="color:var(--accent);">${s.slug}</td>
      <td>${planBadge}</td>
      <td style="font-size:12px;">${expiry.toLocaleDateString()}<div style="font-size:10px;color:${daysLeft<7?'var(--red)':'var(--text3)'};">${expired?'EXPIRED':daysLeft+' days left'}</div></td>
      <td>${statusBadge}</td>
      <td>
        <div style="display:flex;gap:6px;flex-wrap:wrap;">
          <button class="btn btn-sm btn-secondary" onclick="openExtend('${s.slug}','${s.plan}')">📅 Extend</button>
          <button class="btn btn-sm ${s.active?'btn-danger':'btn-success'}" onclick="toggleSchool('${s.slug}',${s.active})">${s.active?'Deactivate':'Activate'}</button>
          <button class="btn btn-sm btn-secondary" onclick="copyLoginURL('${s.slug}')">🔗 URL</button>
        </div>
      </td>
    </tr>`;
  }).join('');
}

function openAddSchool() { document.getElementById('addSchoolModal').classList.add('show'); }
function closeModal(id) { document.getElementById(id).classList.remove('show'); }

async function addSchool() {
  const name = document.getElementById('sName').value.trim();
  const slug = document.getElementById('sSlug').value.trim();
  const password = document.getElementById('sPassword').value.trim();
  const plan = document.getElementById('sPlan').value;
  const days = parseInt(document.getElementById('sDays').value) || 30;
  const phone = document.getElementById('sPhone').value.trim();
  const email = document.getElementById('sEmail').value.trim();
  const err = document.getElementById('addSchoolError');
  if (!name || !slug || !password) { err.textContent = 'Name, slug and password required'; err.style.display = 'block'; return; }
  try {
    await saApi('POST', '/super/schools', { name, slug, adminPassword: password, plan, expiryDays: days, phone, email });
    closeModal('addSchoolModal');
    toast('School created! Login: ADMIN / ' + password, 'success');
    loadDashboard();
    ['sName','sSlug','sPassword','sPhone','sEmail'].forEach(id => document.getElementById(id).value = '');
  } catch(e) { err.textContent = e.message; err.style.display = 'block'; }
}

function openExtend(slug, plan) {
  document.getElementById('extendSlug').value = slug;
  document.getElementById('extendPlan').value = plan;
  document.getElementById('extendModal').classList.add('show');
}

async function extendSubscription() {
  const slug = document.getElementById('extendSlug').value;
  const months = parseInt(document.getElementById('extendMonths').value) || 1;
  const plan = document.getElementById('extendPlan').value;
  try {
    const res = await saApi('POST', '/super/schools/' + slug + '/extend', { months, plan });
    closeModal('extendModal');
    toast(res.message, 'success');
    loadDashboard();
  } catch(e) { toast(e.message, 'error'); }
}

async function toggleSchool(slug, currentActive) {
  if (!confirm((currentActive ? 'Deactivate' : 'Activate') + ' ' + slug + '?')) return;
  try {
    await saApi('PATCH', '/super/schools/' + slug, { active: !currentActive });
    toast('School ' + (currentActive ? 'deactivated' : 'activated'), 'success');
    loadDashboard();
  } catch(e) { toast(e.message, 'error'); }
}

function copyLoginURL(slug) {
  const url = window.location.origin.replace('admin.', '') + '?school=' + slug;
  navigator.clipboard.writeText(url).then(() => toast('URL copied: ' + url, 'success'));
}

// Auto-login if token exists
window.addEventListener('DOMContentLoaded', () => {
  if (SA_TOKEN) {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    loadDashboard();
  }
});
</script>
</body>
</html>
